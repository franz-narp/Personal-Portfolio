<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="../../TGPfavicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGP Pharmacy</title>

    <link rel="stylesheet" href="../../static/landingpage/navigationbarlanding.css">
    <link rel="stylesheet" href="../../static/registration/loginstyles.css">
</head>
<body>
<header>
        <div class="logo">
            <img src="../../static/landingpage/photo/logo.png" alt="TGP Logo" width="100">
        </div>

        <nav>
            <ul>
                <li><a href="../landingpage/landingpage.html">HOME</a></li>
                <li><a href="../landingpage/services.html">SERVICES</a></li>
                <li><a href="../landingpage/about.html">ABOUT US</a></li>
                <li><a href="../landingpage/contact.html">CONTACT US</a></li>
            </ul>
        </nav>

        <a href="register.html" class="login-btn">SIGN UP</a>
    </header>

    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <img src="../../static/landingpage/photo/logo.png" alt="TGP Logo" width="100">
            </div>
            <h3>Welcome to <span class="highlight">TGP</span></h3>
            <p class="subtitle">Login to access Inventory Management</p>

            <form id="loginForm" action="../dashboard/dashboard_demo.html" method="get">
                <label for="username">Username:</label>
                <input type="text" name="username" required>

                <label for="password">Password:</label>
                <input type="password" name="password" required>

                <button type="submit" class="login-btn-submit">LOGIN</button>
            </form>

            <div class="divider"><span>or</span></div>
            <p class="register-text">
                Don’t have an account? <a href="register.html">Sign up</a>
            </p>
        </div>
    </div>
<script>
(function () {
  if (window.__tgpDemoMode) return;
  window.__tgpDemoMode = true;

  document.querySelectorAll('form').forEach(function (form) {
    var action = (form.getAttribute('action') || '').trim();
    if (!action || action === '#' || action.toLowerCase().startsWith('javascript:')) {
      form.addEventListener('submit', function (event) {
        event.preventDefault();
        alert('Demo mode: form submission is disabled.');
      });
    }
  });

  document.querySelectorAll('a[href="#"]').forEach(function (link) {
    link.addEventListener('click', function (event) {
      event.preventDefault();
      alert('Demo mode: this action is not connected to backend logic.');
    });
  });
})();
</script>
</body>
</html>
