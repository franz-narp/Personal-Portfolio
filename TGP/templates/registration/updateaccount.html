<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="../../TGPfavicon.png">
    <meta charset="UTF-8">
    <title>TGP Pharmacy</title>
        <link rel="stylesheet" href="../../static/registration/updateaccountstyles.css">
</head>
<body>
<div class="card">
    <div class="logo-container">
        <img src="../../static/landingpage/photo/logo.png" alt="TGP Logo" width="100">
    </div>
    <div class="welcome">Welcome to <span>TGP</span></div>
    <div class="subtitle">Inventory Management</div>

    <form method="post">
      
      

      <label for="">Username:</label>
      

      <label for="">Email:</label>
      

      <button type="submit" class="btn">UPDATE ACCOUNT</button>
    </form>
  </div>
<script>
(function () {
  if (window.__tgpDemoMode) return;
  window.__tgpDemoMode = true;

  document.querySelectorAll('form').forEach(function (form) {
    var action = (form.getAttribute('action') || '').trim();
    if (!action || action === '#' || action.toLowerCase().startsWith('javascript:')) {
      form.addEventListener('submit', function (event) {
        event.preventDefault();
        alert('Demo mode: form submission is disabled.');
      });
    }
  });

  document.querySelectorAll('a[href="#"]').forEach(function (link) {
    link.addEventListener('click', function (event) {
      event.preventDefault();
      alert('Demo mode: this action is not connected to backend logic.');
    });
  });
})();
</script>
</body>
</html>
