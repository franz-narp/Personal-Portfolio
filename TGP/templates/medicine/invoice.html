<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="../../TGPfavicon.png">
  <meta charset="utf-8">
  <title>TGP Pharmacy</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; margin: 24px; color: #222; }
    header { margin-bottom: 20px; }
    .clinic { font-size: 18px; font-weight: bold; }
    .muted { color: #666; font-size: 0.95em; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { padding: 8px 10px; border: 1px solid #ddd; }
    th { background: #f6f6f6; text-align: left; }
    .right { text-align: right; }
    tfoot td { font-weight: bold; }
    .small { font-size: 0.9em; color: #444; }
    .actions { margin-top: 16px; }
  </style>
</head>
<body>
<a href="#">← Go back</a>
  <header>
    <div class="clinic"></div>
    <div class="muted"> • </div>
  </header>

  <section>
    <h2>Invoice #</h2>
    <p class="small"><strong>Date:</strong> <br>
      <strong>Pharmacist:</strong> </p>
    
      <p class="small"><strong>Customer:</strong> </p>
    
  </section>

  <section>
    <table>
      <thead>
        <tr>
          <th>Medicine</th>
          <th>Batch</th>
          <th class="right">Quantity</th>
          <th class="right">Unit price</th>
          <th class="right">Total</th>
        </tr>
      </thead>
      <tbody>
        
        <tr>
          <td></td>
          <td></td>
          <td class="right"></td>
          <td class="right"></td>
          <td class="right"></td>
        </tr>
        
      </tbody>
      <tfoot>
        <tr>
          <td colspan="4" class="right">Subtotal</td>
          <td class="right"></td>
        </tr>
        <tr>
          <td colspan="4" class="right">Discount</td>
          <td class="right"></td>
        </tr>
        <tr>
          <td colspan="4" class="right">Total</td>
          <td class="right"></td>
        </tr>
      </tfoot>
    </table>
  </section>



  <footer style="margin-top:20px;">
    <p class="small">This is a view-only invoice. For printing, use the print/export feature (not implemented).</p>
  </footer>
<script>
(function () {
  if (window.__tgpDemoMode) return;
  window.__tgpDemoMode = true;

  document.querySelectorAll('form').forEach(function (form) {
    var action = (form.getAttribute('action') || '').trim();
    if (!action || action === '#' || action.toLowerCase().startsWith('javascript:')) {
      form.addEventListener('submit', function (event) {
        event.preventDefault();
        alert('Demo mode: form submission is disabled.');
      });
    }
  });

  document.querySelectorAll('a[href="#"]').forEach(function (link) {
    link.addEventListener('click', function (event) {
      event.preventDefault();
      alert('Demo mode: this action is not connected to backend logic.');
    });
  });
})();
</script>
</body>
</html>
